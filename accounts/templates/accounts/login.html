{% extends "base.html" %}
{% block title %}Login - Family Health Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-0 mt-5">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-heart-pulse-fill text-success fs-1"></i>
          <h2 class="fw-bold mt-2">Family Health Tracker</h2>
          <p class="text-muted">Sign in to your account</p>
        </div>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" name="username" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-success w-100 fw-semibold">Login</button>
        </form>
        <hr>
        <p class="text-center text-muted mb-0">
          New to the family? <a href="{% url 'accounts:register' %}">Create an account</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
