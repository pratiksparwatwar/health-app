{% extends "base.html" %}
{% block title %}Log Meal - Family Health Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card shadow-sm border-0">
      <div class="card-header bg-warning bg-opacity-75 text-dark">
        <h4 class="mb-0"><i class="bi bi-egg-fried me-2"></i>Log a Meal</h4>
      </div>
      <div class="card-body p-4">
        <form method="post" novalidate>
          {% csrf_token %}
          {% for field in form %}
            <div class="mb-3">
              <label class="form-label fw-semibold" for="{{ field.id_for_label }}">{{ field.label }}</label>
              {{ field }}
              {% for error in field.errors %}
                <div class="invalid-feedback d-block">{{ error }}</div>
              {% endfor %}
            </div>
          {% endfor %}
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-warning fw-semibold px-4">Save Meal</button>
            <a href="{% url 'tracker:dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  document.querySelectorAll('input, select, textarea').forEach(el => el.classList.add('form-control'));
</script>
{% endblock %}
