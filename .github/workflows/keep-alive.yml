name: Keep Alive

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app
        run: |
          STATUS=$(curl --silent --show-error --location --max-time 30 --output /dev/null --write-out "%{http_code}" "${{ secrets.APP_URL }}/ping/")
          echo "Response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Ping failed: expected 200, got $STATUS"
            exit 1
          fi
